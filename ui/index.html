<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SyncVCS - Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <!-- Main Application Container -->
    <div class="app-container">
        <div class="auth-wrapper">
            <div class="auth-box">
                <!-- Dynamic content injected by renderer.js -->
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="width: 60px; height: 60px; background: rgba(47, 129, 247, 0.1); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                        <i class="fas fa-shield-alt" style="font-size: 28px; color: var(--accent);"></i>
                    </div>
                    <h2 style="font-size: 20px; color: var(--text-primary); font-weight: 600; margin-bottom: 5px;">Loading...</h2>
                    <p style="color: var(--text-muted); font-size: 13px;">Initializing workspace...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/renderer.js"></script>
</body>
</html>
